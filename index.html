<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日本農業新聞 購読者・契約管理</title>
<style>
/* ─── Design tokens ─────────────────────────────────── */
:root {
  --bg:         #f3f5f2;
  --surface:    #ffffff;
  --surface-2:  #f8faf7;
  --ink:        #1a2318;
  --ink-2:      #3d4e3a;
  --muted:      #6b7c68;
  --line:       #dde5da;
  --brand:      #2d6a4f;
  --brand-dark: #1b4332;
  --brand-pale: #e8f5ee;
  --amber:      #b45309;
  --amber-pale: #fef3c7;
  --red:        #991b1b;
  --red-pale:   #fee2e2;
  --slate:      #64748b;
  --slate-pale: #f1f5f9;
  --radius-sm:  6px;
  --radius:     10px;
  --radius-lg:  14px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow:     0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  --transition: 160ms ease;
}

/* ─── Reset & base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: "Hiragino Sans", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ─── Header ─────────────────────────────────────── */
header {
  background: var(--brand-dark);
  border-bottom: 3px solid var(--brand);
  position: sticky;
  top: 0;
  z-index: 100;
}
.head {
  max-width: 1240px;
  margin: auto;
  padding: 0 24px;
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.head-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.head-logo {
  width: 36px;
  height: 36px;
  background: var(--brand);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.head-logo svg { width: 20px; height: 20px; fill: #fff; }
h1 {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  letter-spacing: .03em;
}
.sub {
  font-size: 11px;
  color: rgba(255,255,255,.55);
  margin-top: 1px;
}

/* ─── Buttons ─────────────────────────────────────── */
button {
  border: none;
  border-radius: var(--radius-sm);
  padding: 9px 16px;
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
button:active { transform: translateY(1px); }

.btn-primary   { background: var(--brand); color: #fff; }
.btn-primary:hover { background: var(--brand-dark); box-shadow: var(--shadow-sm); }
.btn-secondary { background: var(--surface); color: var(--ink-2); border: 1px solid var(--line); }
.btn-secondary:hover { background: var(--surface-2); }
.btn-ghost     { background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.2); font-size: 12px; }
.btn-ghost:hover { background: rgba(255,255,255,.2); }
.btn-danger    { background: var(--red-pale); color: var(--red); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm        { padding: 5px 10px; font-size: 12px; }
.btn-icon      { padding: 7px 10px; }

/* ─── Tabs ──────────────────────────────────────────── */
.tab-bar {
  display: flex;
  gap: 4px;
  padding: 0 24px;
  max-width: 1240px;
  margin: 24px auto 0;
}
.tab {
  background: none;
  color: var(--muted);
  border: none;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .02em;
  position: relative;
  transition: color var(--transition);
}
.tab::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 8px;
  right: 8px;
  height: 2px;
  background: var(--brand);
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform var(--transition);
}
.tab.active { color: var(--brand); }
.tab.active::after { transform: scaleX(1); }
.tab:hover { color: var(--ink-2); }

/* ─── Main layout ─────────────────────────────────── */
main {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 24px 48px;
}
.view-area {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 24px;
}

/* ─── Toast / result ──────────────────────────────── */
#result {
  display: none;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 20px;
  border-left: 3px solid;
  white-space: pre-wrap;
}
#result.ok    { display: block; background: var(--brand-pale); color: var(--brand-dark); border-color: var(--brand); }
#result.error { display: block; background: var(--red-pale);   color: var(--red);         border-color: #fca5a5; }

/* ─── Stats row ───────────────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stat {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  transition: box-shadow var(--transition);
}
.stat:hover { box-shadow: var(--shadow-sm); }
.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
}
.stat-value.active  { color: var(--brand); }
.stat-value.pending { color: var(--amber); }
.stat-value.ended   { color: var(--muted); }

/* ─── Toolbar ─────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filters { display: flex; gap: 8px; flex-wrap: wrap; }

/* ─── Form controls ───────────────────────────────── */
input, select, textarea {
  width: 100%;
  font: inherit;
  font-size: 13px;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  transition: border-color var(--transition), box-shadow var(--transition);
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(45,106,79,.15);
}
input, select  { height: 40px; padding: 0 12px; }
textarea       { min-height: 80px; padding: 10px 12px; resize: vertical; }

.search { max-width: 260px; }
.filter { max-width: 160px; }

/* ─── Table ───────────────────────────────────────── */
.table-wrap {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1040px;
}
thead { position: sticky; top: 0; z-index: 1; }
th, td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 13px;
}
th {
  background: var(--surface-2);
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--brand-pale); }

/* ─── Status badges ───────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-購読中  { background: var(--brand-pale); color: var(--brand-dark); }
.badge-解約予定 { background: var(--amber-pale); color: var(--amber); }
.badge-解約済  { background: var(--slate-pale);  color: var(--slate); }

/* ─── Row actions ─────────────────────────────────── */
.row-actions { display: flex; gap: 6px; }

/* ─── Empty state ─────────────────────────────────── */
.empty {
  padding: 48px 24px;
  text-align: center;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.empty svg { width: 36px; height: 36px; opacity: .35; }
.empty p   { font-size: 13px; }

/* ─── Form layout ─────────────────────────────────── */
.form-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
}
.form-main { display: flex; flex-direction: column; gap: 16px; }

.section {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
}
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--brand);
  border-radius: 2px;
  display: block;
}

/* ─── Grid ────────────────────────────────────────── */
.grid  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.full  { grid-column: 1 / -1; }

label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-2);
  margin-bottom: 5px;
  letter-spacing: .02em;
}
.req { color: var(--brand); margin-left: 2px; }
.help { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ─── Side panel ──────────────────────────────────── */
.side {
  position: sticky;
  top: 80px;
  height: max-content;
}
.side-panel {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
}
.side-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--line);
  font-size: 12px;
}
.summary-row:last-of-type { border-bottom: none; }
.summary-key   { color: var(--muted); }
.summary-val   { font-weight: 700; color: var(--ink); max-width: 130px; text-align: right; word-break: break-all; }
.side-actions  { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.side-actions button { width: 100%; justify-content: center; }

/* ─── Util ────────────────────────────────────────── */
.hidden { display: none !important; }

/* ─── Responsive ──────────────────────────────────── */
@media (max-width: 900px) {
  .form-layout { grid-template-columns: 1fr; }
  .side { position: static; }
  .grid { grid-template-columns: 1fr 1fr; }
  .stats { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .full { grid-column: auto; }
  .head { padding: 0 16px; }
  main  { padding: 0 16px 40px; }
  .tab-bar { padding: 0 16px; }
  .search { max-width: 100%; }
}
</style>
</head>
<body>

<!-- ▸ Header -->
<header>
  <div class="head">
    <div class="head-brand">
      <div class="head-logo">
        <!-- wheat icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C9.8 4.2 9 6.5 9 9c0 1.3.3 2.5.8 3.6L3 20l1.4 1.4 6.8-6.8c.9.4 1.8.7 2.8.7 2.5 0 4.8-.8 7-3C19 7.2 14.8 2 12 2zm0 2.3c1.3 1.5 4.3 5.3 3 8.4-.7-1.2-1.7-2.2-2.9-3 .7 1 1.1 2.2 1.1 3.5-.8-.8-1.4-1.8-1.8-2.9C10.5 11.7 10 13 10 14.3c-.5-.9-.8-1.9-.8-3 0-2 .9-4.1 2.8-7z"/>
        </svg>
      </div>
      <div>
        <h1>日本農業新聞 購読者・契約管理</h1>
        <div class="sub">購読者情報・契約・配達店・支払・解約を一元管理</div>
      </div>
    </div>
    <button id="healthBtn" class="btn-ghost">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      接続確認
    </button>
  </div>
</header>

<!-- ▸ Tabs -->
<div class="tab-bar">
  <button class="tab active" data-view="list">契約一覧</button>
  <button class="tab" data-view="form">新規登録</button>
</div>

<!-- ▸ Main -->
<main>
  <div class="view-area">
    <div id="result"></div>

    <!-- ── List view ── -->
    <section id="listView">
      <div class="stats">
        <div class="stat">
          <div class="stat-label">全契約</div>
          <div class="stat-value" id="sAll">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">購読中</div>
          <div class="stat-value active" id="sActive">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">解約予定</div>
          <div class="stat-value pending" id="sPending">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">解約済</div>
          <div class="stat-value ended" id="sEnded">0</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="filters">
          <input id="keyword"      class="search" placeholder="氏名・住所・電話・販売店で検索">
          <select id="statusFilter" class="filter">
            <option value="">すべての状態</option>
            <option>購読中</option>
            <option>解約予定</option>
            <option>解約済</option>
          </select>
          <select id="mediaFilter"  class="filter">
            <option value="">すべての媒体</option>
            <option>紙版</option>
            <option>電子版</option>
            <option>併読</option>
          </select>
        </div>
        <button id="reloadBtn" class="btn-secondary btn-sm">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          再読み込み
        </button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>氏名</th>
              <th>電話番号</th>
              <th>媒体</th>
              <th>状態</th>
              <th>開始日</th>
              <th>終了日</th>
              <th>販売店</th>
              <th>支払方法</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
        <div id="empty" class="empty hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
          <p>登録データがありません。<br>「新規登録」タブから追加してください。</p>
        </div>
      </div>
    </section>

    <!-- ── Form view ── -->
    <section id="formView" class="hidden">
      <form id="form">
        <input type="hidden" name="record_id">
        <div class="form-layout">
          <div class="form-main">

            <!-- 基本情報 -->
            <div class="section">
              <div class="section-title">基本情報</div>
              <div class="grid">
                <div>
                  <label>作業月</label>
                  <input type="date" name="work_month">
                  <div class="help">当月5日を初期設定</div>
                </div>
                <div>
                  <label>管理店舗</label>
                  <input name="management_store">
                </div>
                <div>
                  <label>担当者</label>
                  <input name="staff">
                </div>
              </div>
            </div>

            <!-- 購読者情報 -->
            <div class="section">
              <div class="section-title">購読者情報</div>
              <div class="grid">
                <div>
                  <label>組合員番号</label>
                  <input name="member_no">
                </div>
                <div>
                  <label>氏名<span class="req">*</span></label>
                  <input name="name" required>
                </div>
                <div>
                  <label>フリガナ</label>
                  <input name="furigana">
                </div>
                <div>
                  <label>郵便番号</label>
                  <input name="zip_code" placeholder="000-0000">
                </div>
                <div class="full">
                  <label>住所</label>
                  <input name="address">
                </div>
                <div>
                  <label>電話番号</label>
                  <input name="phone" placeholder="000-0000-0000">
                </div>
                <div>
                  <label>購読者属性</label>
                  <select name="subscriber_type">
                    <option value=""></option>
                    <option>正組合員</option>
                    <option>准組合員</option>
                    <option>員外</option>
                    <option>その他</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 契約情報 -->
            <div class="section">
              <div class="section-title">契約情報</div>
              <div class="grid">
                <div>
                  <label>購読媒体<span class="req">*</span></label>
                  <select name="contract_type">
                    <option>紙版</option>
                    <option>電子版</option>
                    <option>併読</option>
                  </select>
                </div>
                <div>
                  <label>購読部数</label>
                  <input type="number" min="1" name="copies" value="1">
                </div>
                <div>
                  <label>契約状態<span class="req">*</span></label>
                  <select name="contract_status">
                    <option>購読中</option>
                    <option>解約予定</option>
                    <option>解約済</option>
                  </select>
                </div>
                <div>
                  <label>購読申込日</label>
                  <input type="date" name="application_date">
                </div>
                <div>
                  <label>購読開始日<span class="req">*</span></label>
                  <input type="date" name="start_date" required>
                </div>
                <div>
                  <label>購読証明書</label>
                  <select name="certificate">
                    <option>発行しない</option>
                    <option>発行する</option>
                  </select>
                </div>
                <div class="full">
                  <label>自由記入欄</label>
                  <textarea name="notes" placeholder="備考・特記事項など"></textarea>
                </div>
              </div>
            </div>

            <!-- 配達・販売店情報 -->
            <div class="section" id="deliverySection">
              <div class="section-title">配達・販売店情報</div>
              <div class="grid">
                <div>
                  <label>販売店コード</label>
                  <input name="delivery_shop_code">
                </div>
                <div>
                  <label>販売店名</label>
                  <input name="delivery_shop">
                </div>
                <div class="full">
                  <label>配達店向け備考</label>
                  <input name="delivery_note">
                </div>
              </div>
            </div>

            <!-- 決済・電子版情報 -->
            <div class="section">
              <div class="section-title">決済・電子版情報</div>
              <div class="grid">
                <div>
                  <label>支払方法</label>
                  <select name="payment_method">
                    <option>JA口座振替</option>
                    <option>新聞販売店集金</option>
                    <option>クレジットカード</option>
                    <option>その他</option>
                  </select>
                </div>
                <div id="emailField">
                  <label>電子版メールアドレス</label>
                  <input type="email" name="email">
                </div>
                <div>
                  <label>領収書</label>
                  <select name="receipt">
                    <option>発行しない</option>
                    <option>発行する</option>
                  </select>
                </div>
              </div>
              <div id="bankFields" class="grid" style="margin-top:14px">
                <div>
                  <label>金融機関コード</label>
                  <input name="bank_code">
                </div>
                <div>
                  <label>支店コード</label>
                  <input name="bank_branch_code">
                </div>
                <div>
                  <label>貯金種目</label>
                  <select name="account_type">
                    <option value=""></option>
                    <option>普通</option>
                    <option>当座</option>
                  </select>
                </div>
                <div>
                  <label>口座番号</label>
                  <input name="account_number">
                </div>
                <div>
                  <label>口座名義</label>
                  <input name="account_name">
                </div>
              </div>
            </div>

            <!-- 解約情報（条件付き） -->
            <div class="section hidden" id="cancelSection">
              <div class="section-title">解約情報</div>
              <div class="grid">
                <div>
                  <label>解約受付日</label>
                  <input type="date" name="cancel_accept_date">
                </div>
                <div>
                  <label>購読終了日</label>
                  <input type="date" name="end_date">
                </div>
                <div class="full">
                  <label>解約理由</label>
                  <textarea name="cancel_reason" placeholder="解約理由を入力してください"></textarea>
                </div>
              </div>
            </div>

          </div><!-- /form-main -->

          <!-- Side panel -->
          <aside class="side">
            <div class="side-panel">
              <div class="side-title" id="formTitle">新規登録</div>
              <div class="summary-row"><span class="summary-key">媒体</span><strong class="summary-val" id="sumMedia">紙版</strong></div>
              <div class="summary-row"><span class="summary-key">状態</span><strong class="summary-val" id="sumStatus">購読中</strong></div>
              <div class="summary-row"><span class="summary-key">開始日</span><strong class="summary-val" id="sumStart">－</strong></div>
              <div class="summary-row"><span class="summary-key">販売店</span><strong class="summary-val" id="sumShop">－</strong></div>
              <div class="side-actions">
                <button id="saveBtn" class="btn-primary" type="submit">登録する</button>
                <button id="cancelBtn" class="btn-secondary" type="button">一覧へ戻る</button>
              </div>
            </div>
          </aside>

        </div><!-- /form-layout -->
      </form>
    </section>

  </div><!-- /view-area -->
</main>

<!-- honeypot -->
<div style="position:absolute;left:-9999px"><input name="website" tabindex="-1"></div>

<script>
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzICttdhhYIgvSkh0its-_mCP1qq5LaTS-9Oe4ScxqoU5vVnHmYU9SNv1QbOzaPdOJekA/exec';
const state = { records: [] };
const form     = document.getElementById('form');
const result   = document.getElementById('result');
const listBody = document.getElementById('listBody');

// ── helpers ──────────────────────────────────────────
const today    = () => new Date().toLocaleDateString('sv-SE');
const month5   = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-05`; };
const monthEnd = () => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth()+1, 0).toLocaleDateString('sv-SE'); };
const esc = v => String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));

function show(type, msg) { result.className = type; result.textContent = msg; result.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
function clearMsg()      { result.className = '';   result.textContent = ''; }

async function callGas(payload) {
  const res  = await fetch(GAS_WEB_APP_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload), redirect:'follow' });
  const text = await res.text();
  try { return JSON.parse(text); } catch { throw new Error('GASからJSON以外の応答が返りました。'); }
}

// ── view switching ────────────────────────────────────
function setView(v) {
  document.getElementById('listView').classList.toggle('hidden', v !== 'list');
  document.getElementById('formView').classList.toggle('hidden', v !== 'form');
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.view === v));
}

// ── form ──────────────────────────────────────────────
function resetForm() {
  form.reset();
  form.record_id.value         = '';
  form.work_month.value        = month5();
  form.application_date.value  = today();
  form.start_date.value        = today();
  form.copies.value            = 1;
  form.contract_type.value     = '紙版';
  form.contract_status.value   = '購読中';
  form.payment_method.value    = 'JA口座振替';
  document.getElementById('formTitle').textContent = '新規登録';
  document.getElementById('saveBtn').textContent   = '登録する';
  updateUI();
}

function updateUI() {
  const m = form.contract_type.value;
  const s = form.contract_status.value;
  const p = form.payment_method.value;

  document.getElementById('deliverySection').classList.toggle('hidden', m === '電子版');
  document.getElementById('emailField').classList.toggle('hidden',      m === '紙版');
  document.getElementById('bankFields').classList.toggle('hidden',      p !== 'JA口座振替');
  document.getElementById('cancelSection').classList.toggle('hidden',   s === '購読中');

  if (s === '解約予定' && !form.cancel_accept_date.value) {
    form.cancel_accept_date.value = today();
    form.end_date.value           = monthEnd();
  }

  document.getElementById('sumMedia').textContent  = m;
  document.getElementById('sumStatus').textContent = s;
  document.getElementById('sumStart').textContent  = form.start_date.value || '－';
  document.getElementById('sumShop').textContent   = form.delivery_shop.value || '－';
}

// ── stats ─────────────────────────────────────────────
function stats() {
  document.getElementById('sAll').textContent     = state.records.length;
  document.getElementById('sActive').textContent  = state.records.filter(x => x.contract_status === '購読中').length;
  document.getElementById('sPending').textContent = state.records.filter(x => x.contract_status === '解約予定').length;
  document.getElementById('sEnded').textContent   = state.records.filter(x => x.contract_status === '解約済').length;
}

// ── render table ──────────────────────────────────────
function render(rs) {
  listBody.innerHTML = '';
  document.getElementById('empty').classList.toggle('hidden', rs.length > 0);
  rs.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:12px">${esc(r.id)}</td>
      <td><strong>${esc(r.name)}</strong></td>
      <td>${esc(r.phone)}</td>
      <td>${esc(r.contract_type)}</td>
      <td><span class="badge badge-${esc(r.contract_status)}">${esc(r.contract_status)}</span></td>
      <td>${esc(r.start_date)}</td>
      <td>${esc(r.end_date)}</td>
      <td>${esc(r.delivery_shop)}</td>
      <td>${esc(r.payment_method)}</td>
      <td>
        <div class="row-actions">
          <button class="btn-secondary btn-sm" data-action="edit"   data-id="${r.id}">編集</button>
          <button class="btn-danger   btn-sm" data-action="delete" data-id="${r.id}">削除</button>
        </div>
      </td>`;
    listBody.appendChild(tr);
  });
}

// ── filter ────────────────────────────────────────────
function filter() {
  const q = document.getElementById('keyword').value.toLowerCase();
  const s = document.getElementById('statusFilter').value;
  const m = document.getElementById('mediaFilter').value;
  render(state.records.filter(r =>
    (!q || [r.name, r.address, r.phone, r.delivery_shop, r.member_no].some(v => String(v || '').toLowerCase().includes(q))) &&
    (!s || r.contract_status === s) &&
    (!m || r.contract_type   === m)
  ));
}

// ── load ──────────────────────────────────────────────
async function load() {
  try {
    const d = await callGas({ action: 'list' });
    if (!d.ok) throw new Error(d.message);
    state.records = d.records || [];
    stats();
    filter();
  } catch(e) {
    show('error', '一覧取得に失敗しました。\n' + e.message);
  }
}

// ── edit ──────────────────────────────────────────────
function edit(id) {
  const r = state.records.find(x => String(x.id) === String(id));
  if (!r) return;
  Object.entries(r).forEach(([k, v]) => { if (form.elements[k]) form.elements[k].value = v ?? ''; });
  form.record_id.value = r.id;
  document.getElementById('formTitle').textContent = '契約内容を編集';
  document.getElementById('saveBtn').textContent   = '更新する';
  updateUI();
  clearMsg();
  setView('form');
}

// ── delete ────────────────────────────────────────────
async function del(id) {
  const r = state.records.find(x => String(x.id) === String(id));
  if (!confirm(`「${r?.name || id}」を削除しますか？`)) return;
  try {
    const d = await callGas({ action: 'delete', record_id: id });
    if (!d.ok) throw new Error(d.message);
    show('ok', '削除しました。');
    await load();
  } catch(e) {
    show('error', '削除に失敗しました。\n' + e.message);
  }
}

// ── events ────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(b => {
  b.onclick = () => { clearMsg(); if (b.dataset.view === 'form') resetForm(); setView(b.dataset.view); };
});

['contract_type','contract_status','payment_method','start_date','delivery_shop'].forEach(n => {
  form.elements[n].addEventListener('change', updateUI);
  form.elements[n].addEventListener('input',  updateUI);
});

document.getElementById('keyword').oninput      = filter;
document.getElementById('statusFilter').onchange = filter;
document.getElementById('mediaFilter').onchange  = filter;
document.getElementById('reloadBtn').onclick      = load;
document.getElementById('cancelBtn').onclick      = () => setView('list');

document.getElementById('healthBtn').onclick = async () => {
  try {
    const d = await callGas({ action: 'health' });
    if (!d.ok) throw new Error(d.message);
    show('ok', d.message);
  } catch(e) { show('error', e.message); }
};

listBody.onclick = e => {
  const b = e.target.closest('button[data-action]');
  if (!b) return;
  b.dataset.action === 'edit' ? edit(b.dataset.id) : del(b.dataset.id);
};

form.onsubmit = async e => {
  e.preventDefault();
  const p = Object.fromEntries(new FormData(form).entries());
  p.action = p.record_id ? 'update' : 'create';
  try {
    const d = await callGas(p);
    if (!d.ok) throw new Error(d.message);
    show('ok', p.action === 'create' ? '登録しました。' : '更新しました。');
    resetForm();
    setView('list');
    await load();
  } catch(err) {
    show('error', '保存に失敗しました。\n' + err.message);
  }
};

// ── init ──────────────────────────────────────────────
resetForm();
load();
</script>
</body>
</html>
