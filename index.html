<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>kintone接続テスト</title>
<style>
body{margin:0;background:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:#1f2933}
main{max-width:640px;margin:48px auto;padding:0 16px}
section{background:#fff;border:1px solid #dfe4e8;border-radius:10px;padding:28px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
h1{margin:0 0 8px;font-size:24px}.lead{color:#68737d;margin:0 0 24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.full{grid-column:1/-1}
label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
input,select{width:100%;height:44px;padding:0 12px;border:1px solid #ccd4da;border-radius:6px;font:inherit;box-sizing:border-box}
.actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
button{border:0;border-radius:6px;padding:12px 18px;font-weight:700;cursor:pointer}
.primary{background:#1677c8;color:#fff}.secondary{background:#e8edf1;color:#27313a}
#result{display:none;margin-top:18px;padding:14px;border-radius:6px;white-space:pre-wrap}
#result.ok{display:block;background:#edf9f0;color:#166534;border:1px solid #b8dfc2}
#result.error{display:block;background:#fff1f0;color:#b42318;border:1px solid #f0c2bd}
.note{font-size:12px;color:#6b7280;line-height:1.6;margin-top:18px}
@media(max-width:600px){main{margin:20px auto}.grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style>
</head>
<body>
<main><section>
<h1>kintone接続テスト</h1>
<p class="lead">送信すると「日本農業新聞 購読者管理」に1件登録します。</p>
<form id="form">
<div class="grid">
<div class="full"><label>氏名</label><input name="name" value="GitHub接続テスト" required></div>
<div><label>契約種別</label><select name="contract_type"><option>紙版</option><option>電子版</option><option>併読</option></select></div>
<div><label>契約状態</label><select name="contract_status"><option>購読中</option><option>解約予定</option><option>解約済</option></select></div>
<div><label>購読開始日</label><input name="start_date" type="date" required></div>
</div>
<div class="actions">
<button class="primary" id="submitBtn" type="submit">kintoneへ登録</button>
<button class="secondary" id="healthBtn" type="button">接続先を確認</button>
</div>
</form>
<div id="result"></div>
<p class="note">APIトークンはHTMLに置かず、Cloudflare Workerに保存します。</p>
</section></main>
<script>
const API_BASE_URL='https://YOUR-WORKER.workers.dev';
const form=document.getElementById('form');
const result=document.getElementById('result');
form.start_date.value=new Date().toISOString().slice(0,10);
function show(type,msg){result.className=type;result.textContent=msg}
async function read(res){const t=await res.text();try{return JSON.parse(t)}catch{return{ok:false,message:t||'応答形式が不正です'}}}
document.getElementById('healthBtn').onclick=async()=>{
  show('ok','接続確認中…');
  try{const r=await fetch(API_BASE_URL+'/health');const d=await read(r);if(!r.ok||!d.ok)throw new Error(d.message);show('ok',d.message)}
  catch(e){show('error','接続確認に失敗しました。\n'+e.message)}
};
form.onsubmit=async(e)=>{
  e.preventDefault();show('ok','kintoneへ登録中…');
  const payload=Object.fromEntries(new FormData(form).entries());
  try{
    const r=await fetch(API_BASE_URL+'/records',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d=await read(r);if(!r.ok||!d.ok)throw new Error(d.message||'登録失敗');
    show('ok','登録に成功しました。\nレコードID：'+d.recordId);
  }catch(err){show('error','登録に失敗しました。\n'+err.message)}
};
</script>
</body>
</html>
