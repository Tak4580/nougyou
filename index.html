/* 編集見出しを常に表示 */
.form-layout{align-items:start}
.side{align-self:start;position:sticky;top:82px;max-height:calc(100vh - 98px)}
.side-panel{max-height:calc(100vh - 98px);overflow:auto;overscroll-behavior:contain;scrollbar-gutter:stable}
.side-heading{position:sticky;top:-18px;z-index:3;margin:-18px -18px 0;padding:18px 18px 14px;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(60,60,67,.12)}
.side-heading .side-description{padding-bottom:0;border-bottom:0}
@media(max-width:760px){
  .side{max-height:none}
  .side-panel{max-height:none;overflow:visible}
  .side-heading{display:none}
}
</style></head><body>
<div class="app"><header class="app-header"><div class="header-inner"><div class="logo"><div class="logo-mark" aria-hidden="true">N</div><div><div class="logo-title">日本農業新聞 購読管理</div><div class="logo-sub">SUBSCRIPTION MANAGEMENT</div></div></div><nav class="nav" aria-label="主要メニュー"><button class="tab active" data-view="list"><span class="tab-icon">▤</span><span>契約一覧</span></button><button class="tab tab-primary" data-view="form"><span class="tab-icon">＋</span><span>新規登録</span></button></nav><button id="healthBtn" class="connection-status" aria-label="接続状態を確認"><span class="status-dot"></span><span class="connection-label">接続確認</span></button></div></header>
<main class="main"><div class="topbar"><div class="search-wrap"><span class="search-icon" aria-hidden="true">⌕</span><input id="keyword" autocomplete="off" placeholder="氏名・住所・電話・販売店・組合員番号で検索"><button type="button" id="clearSearchBtn" class="search-clear hidden" aria-label="検索をクリア">×</button></div></div><div id="result"></div><div class="view-area">
<section id="listView">
<div class="list-card">
  <div class="list-toolbar-row">
    <h2>契約一覧</h2>
    <span class="list-count" id="resultCount">0件</span>
  </div>
  <div class="toolbar">
    <div class="filters">
      <select id="statusFilter"><option value="">状態：すべて</option><option>購読中</option><option>解約予定</option><option>解約済</option></select>
      <select id="mediaFilter"><option value="">媒体：すべて</option><option>紙版</option><option>電子版</option><option>併読</option></select>
    </div>
    <button id="clearFiltersBtn" class="btn-text">条件を解除</button><button id="reloadBtn" class="icon-action" aria-label="一覧を再読み込み" title="再読み込み">↻</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>氏名</th><th>電話番号</th><th>住所</th><th>媒体</th><th>状態</th><th>開始日</th><th>終了日</th><th>販売店</th><th>支払方法</th><th>操作</th></tr></thead>
      <tbody id="listBody"></tbody>
    </table>
    <div id="empty" class="empty hidden"><div class="empty-icon">▤</div><strong>契約データがありません</strong><span>「新規契約」から最初の契約を登録できます。</span><button type="button" class="btn-primary tab" data-view="form">＋ 新規契約を登録</button></div>
  </div>
</div>
</section>
    <!-- ── Form view ── -->
    <section id="formView" class="hidden">
      <form id="form">
        <input type="hidden" name="record_id">
        <div class="form-layout">
          <div class="form-main">

            <!-- 基本情報 -->
            <div class="section">
              <div class="section-title">基本情報</div>
              <div class="grid">
                <div>
                  <label>作業月</label>
                  <input type="date" name="work_month">
                  <div class="help">当月5日を初期設定</div>
                </div>
                <div>
                  <label>管理店舗</label>
                  <input name="management_store">
                </div>
                <div>
                  <label>担当者</label>
                  <input name="staff">
                </div>
              </div>
            </div>

            <!-- 購読者情報 -->
            <div class="section">
              <div class="section-title">購読者情報</div>
              <div class="grid">
                <div>
                  <label>組合員番号</label>
                  <input name="member_no">
                </div>
                <div>
                  <label>氏名<span class="req">*</span></label>
                  <input name="name" required>
                </div>
                <div>
                  <label>フリガナ</label>
                  <input name="furigana">
                </div>
                <div>
                  <label>郵便番号</label>
                  <input name="zip_code" placeholder="000-0000">
                </div>
                <div class="full">
                  <label>住所</label>
                  <input name="address">
                </div>
                <div>
                  <label>電話番号</label>
                  <input name="phone" placeholder="000-0000-0000">
                </div>
                <div>
                  <label>購読者属性</label>
                  <select name="subscriber_type">
                    <option value=""></option>
                    <option>正組合員</option>
                    <option>准組合員</option>
                    <option>員外</option>
                    <option>その他</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 契約情報 -->
            <div class="section">
              <div class="section-title">契約情報</div>
              <div class="grid">
                <div>
                  <label>購読媒体<span class="req">*</span></label>
                  <select name="contract_type">
                    <option>紙版</option>
                    <option>電子版</option>
                    <option>併読</option>
                  </select>
                </div>
                <div>
                  <label>購読部数</label>
                  <input type="number" min="1" name="copies" value="1">
                </div>
                <div>
                  <label>契約状態<span class="req">*</span></label>
                  <select name="contract_status">
                    <option>購読中</option>
                    <option>解約予定</option>
                    <option>解約済</option>
                  </select>
                </div>
                <div>
                  <label>購読申込日</label>
                  <input type="date" name="application_date">
                </div>
                <div>
                  <label>購読開始日<span class="req">*</span></label>
                  <input type="date" name="start_date" required>
                </div>
                <div>
                  <label>購読証明書</label>
                  <select name="certificate">
                    <option>発行しない</option>
                    <option>発行する</option>
                  </select>
                </div>
                <div class="full">
                  <label>自由記入欄</label>
                  <textarea name="notes" placeholder="備考・特記事項など"></textarea>
                </div>
              </div>
            </div>

            <!-- 配達・販売店情報 -->
            <div class="section" id="deliverySection">
              <div class="section-title">配達・販売店情報</div>
              <div class="grid">
                <div>
                  <label>販売店コード</label>
                  <input name="delivery_shop_code">
                </div>
                <div>
                  <label>販売店名</label>
                  <input name="delivery_shop">
                </div>
                <div class="full">
                  <label>配達店向け備考</label>
                  <input name="delivery_note">
                </div>
              </div>
            </div>

            <!-- 決済・電子版情報 -->
            <div class="section">
              <div class="section-title">決済・電子版情報</div>
              <div class="grid">
                <div>
                  <label>支払方法</label>
                  <select name="payment_method">
                    <option>JA口座振替</option>
                    <option>新聞販売店集金</option>
                    <option>クレジットカード</option>
                    <option>その他</option>
                  </select>
                </div>
                <div id="emailField">
                  <label>電子版メールアドレス</label>
                  <input type="email" name="email">
                </div>
                <div>
                  <label>領収書</label>
                  <select name="receipt">
                    <option>発行しない</option>
                    <option>発行する</option>
                  </select>
                </div>
              </div>
              <div id="bankFields" class="grid" style="margin-top:14px">
                <div>
                  <label>金融機関コード</label>
                  <input name="bank_code">
                </div>
                <div>
                  <label>支店コード</label>
                  <input name="bank_branch_code">
                </div>
                <div>
                  <label>貯金種目</label>
                  <select name="account_type">
                    <option value=""></option>
                    <option>普通</option>
                    <option>当座</option>
                  </select>
                </div>
                <div>
                  <label>口座番号</label>
                  <input name="account_number">
                </div>
                <div>
                  <label>口座名義</label>
                  <input name="account_name">
                </div>
              </div>
            </div>

            <!-- 解約情報（条件付き） -->
            <div class="section hidden" id="cancelSection">
              <div class="section-title">解約情報</div>
              <div class="grid">
                <div>
                  <label>解約受付日</label>
                  <input type="date" name="cancel_accept_date">
                </div>
                <div>
                  <label>購読終了日</label>
                  <input type="date" name="end_date">
                </div>
                <div class="full">
                  <label>解約理由</label>
                  <textarea name="cancel_reason" placeholder="解約理由を入力してください"></textarea>
                </div>
              </div>
            </div>

          </div><!-- /form-main -->

          <!-- Side panel -->
          <aside class="side">
            <div class="side-panel">
              <div class="side-heading"><div class="side-eyebrow">入力内容</div><div class="side-title" id="formTitle">新規登録</div><div class="side-description" id="formDescription">必要事項を入力して登録してください。</div></div>
              <div class="summary-row"><span class="summary-key">媒体</span><strong class="summary-val" id="sumMedia">紙版</strong></div>
              <div class="summary-row"><span class="summary-key">状態</span><strong class="summary-val" id="sumStatus">購読中</strong></div>
              <div class="summary-row"><span class="summary-key">開始日</span><strong class="summary-val" id="sumStart">－</strong></div>
              <div class="summary-row"><span class="summary-key">販売店</span><strong class="summary-val" id="sumShop">－</strong></div>
              <div class="side-actions">
                <button id="saveBtn" class="btn-primary save-button" type="submit"><span class="button-label">登録する</span></button>
                <button id="cancelBtn" class="btn-secondary" type="button">一覧へ戻る</button>
              </div>
            </div>
          </aside>

        </div><!-- /form-layout -->
      </form>
    </section>


</div></main></div>
<script>
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzICttdhhYIgvSkh0its-_mCP1qq5LaTS-9Oe4ScxqoU5vVnHmYU9SNv1QbOzaPdOJekA/exec';
const state = { records: [], selectedId: null };
const form     = document.getElementById('form');
const result   = document.getElementById('result');
const listBody = document.getElementById('listBody');

// ── helpers ──────────────────────────────────────────
const today    = () => new Date().toLocaleDateString('sv-SE');
const month5   = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-05`; };
const monthEnd = () => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth()+1, 0).toLocaleDateString('sv-SE'); };
const esc = v => String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));

function show(type, msg) { result.className = type; result.textContent = msg; result.scrollIntoView({ behavior:'smooth', block:'nearest' }); clearTimeout(show._timer); show._timer=setTimeout(()=>{ if(result.className===type) clearMsg(); }, type==='ok'?3600:8000); }
function clearMsg()      { result.className = '';   result.textContent = ''; }

async function callGas(payload) {
  const res  = await fetch(GAS_WEB_APP_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload), redirect:'follow' });
  const text = await res.text();
  try { return JSON.parse(text); } catch { throw new Error('GASからJSON以外の応答が返りました。'); }
}

// ── view switching ────────────────────────────────────
function setView(v) {
  document.getElementById('listView').classList.toggle('hidden', v !== 'list');
  document.getElementById('formView').classList.toggle('hidden', v !== 'form');
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.view === v));
}

// ── form ──────────────────────────────────────────────
function resetForm() {
  form.reset();
  form.record_id.value         = '';
  form.work_month.value        = month5();
  form.application_date.value  = today();
  form.start_date.value        = today();
  form.copies.value            = 1;
  form.contract_type.value     = '紙版';
  form.contract_status.value   = '購読中';
  form.payment_method.value    = 'JA口座振替';
  document.getElementById('formTitle').textContent = '新規登録';
  document.getElementById('formDescription').textContent = '必要事項を入力して登録してください。';
  document.querySelector('#saveBtn .button-label').textContent = '登録する';
  updateUI();
}

function updateUI() {
  const m = form.contract_type.value;
  const s = form.contract_status.value;
  const p = form.payment_method.value;

  document.getElementById('deliverySection').classList.toggle('hidden', m === '電子版');
  document.getElementById('emailField').classList.toggle('hidden',      m === '紙版');
  document.getElementById('bankFields').classList.toggle('hidden',      p !== 'JA口座振替');
  document.getElementById('cancelSection').classList.toggle('hidden',   s === '購読中');

  if (s === '解約予定' && !form.cancel_accept_date.value) {
    form.cancel_accept_date.value = today();
    form.end_date.value           = monthEnd();
  }

  document.getElementById('sumMedia').textContent  = m;
  document.getElementById('sumStatus').textContent = s;
  document.getElementById('sumStart').textContent  = form.start_date.value || '－';
  document.getElementById('sumShop').textContent   = form.delivery_shop.value || '－';
}

// ── render table ──────────────────────────────────────
function render(rs) {
  listBody.innerHTML = '';
  document.getElementById('empty').classList.toggle('hidden', rs.length > 0);
  document.getElementById('resultCount').textContent = `${rs.length}件`;
  rs.forEach(r => {
    const tr = document.createElement('tr');
    tr.dataset.id = r.id;
    tr.innerHTML = `
      <td class="table-name" data-label="氏名">${esc(r.name || '氏名未設定')}</td>
      <td data-label="電話番号">${esc(r.phone || '－')}</td>
      <td class="table-address" data-label="住所" title="${esc(r.address || '')}">${esc(r.address || '－')}</td>
      <td data-label="媒体">${esc(r.contract_type || '－')}</td>
      <td data-label="状態"><span class="badge badge-${esc(r.contract_status)}">${esc(r.contract_status || '－')}</span></td>
      <td data-label="開始日">${esc(r.start_date || '－')}</td>
      <td data-label="終了日">${esc(r.end_date || '－')}</td>
      <td data-label="販売店">${esc(r.delivery_shop || '－')}</td>
      <td data-label="支払方法">${esc(r.payment_method || '－')}</td>
      <td data-label="操作"><div class="row-actions"><button class="btn-secondary" data-action="edit" data-id="${esc(r.id)}">編集</button><button class="btn-danger" data-action="delete" data-id="${esc(r.id)}">削除</button></div></td>`;
    listBody.appendChild(tr);
  });
}

// ── filter ────────────────────────────────────────────
function filter() {
  const q = document.getElementById('keyword').value.toLowerCase();
  const s = document.getElementById('statusFilter').value;
  const m = document.getElementById('mediaFilter').value;
  render(state.records.filter(r =>
    (!q || [r.name, r.address, r.phone, r.delivery_shop, r.member_no].some(v => String(v || '').toLowerCase().includes(q))) &&
    (!s || r.contract_status === s) &&
    (!m || r.contract_type   === m)
  ));
}

// ── load ──────────────────────────────────────────────
async function load() {
  try {
    const d = await callGas({ action: 'list' });
    if (!d.ok) throw new Error(d.message);
    state.records = d.records || [];
    filter();
  } catch(e) {
    show('error', '一覧取得に失敗しました。\n' + e.message);
  }
}

// ── edit ──────────────────────────────────────────────
function edit(id) {
  const r = state.records.find(x => String(x.id) === String(id));
  if (!r) return;
  Object.entries(r).forEach(([k, v]) => { if (form.elements[k]) form.elements[k].value = v ?? ''; });
  form.record_id.value = r.id;
  document.getElementById('formTitle').textContent = '契約内容を編集';
  document.getElementById('formDescription').textContent = `${r.name || '選択した契約'}の内容を更新します。`;
  document.querySelector('#saveBtn .button-label').textContent = '更新する';
  updateUI();
  clearMsg();
  setView('form');
}

// ── delete ────────────────────────────────────────────
async function del(id) {
  const r = state.records.find(x => String(x.id) === String(id));
  if (!confirm(`「${r?.name || id}」を削除しますか？`)) return;
  try {
    const d = await callGas({ action: 'delete', record_id: id });
    if (!d.ok) throw new Error(d.message);
    show('ok', '削除しました。');
    await load();
  } catch(e) {
    show('error', '削除に失敗しました。\n' + e.message);
  }
}

// ── events ────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(b => {
  b.onclick = () => { clearMsg(); if (b.dataset.view === 'form') resetForm(); setView(b.dataset.view); };
});

['contract_type','contract_status','payment_method','start_date','delivery_shop'].forEach(n => {
  form.elements[n].addEventListener('change', updateUI);
  form.elements[n].addEventListener('input',  updateUI);
});

document.getElementById('keyword').oninput = e => { document.getElementById('clearSearchBtn').classList.toggle('hidden', !e.target.value); filter(); };
document.getElementById('clearSearchBtn').onclick = () => { const input=document.getElementById('keyword'); input.value=''; document.getElementById('clearSearchBtn').classList.add('hidden'); input.focus(); filter(); };
document.getElementById('clearFiltersBtn').onclick = () => { document.getElementById('statusFilter').value=''; document.getElementById('mediaFilter').value=''; filter(); };
document.getElementById('statusFilter').onchange = filter;
document.getElementById('mediaFilter').onchange  = filter;
document.getElementById('reloadBtn').onclick      = load;
document.getElementById('cancelBtn').onclick      = () => setView('list');

document.getElementById('healthBtn').onclick = async () => {
  const btn=document.getElementById('healthBtn'); btn.classList.remove('error'); btn.classList.add('checking'); btn.disabled=true;
  try {
    const d = await callGas({ action: 'health' });
    if (!d.ok) throw new Error(d.message);
    show('ok', d.message);
  } catch(e) { btn.classList.add('error'); show('error', e.message); } finally { btn.classList.remove('checking'); btn.disabled=false; }
};

listBody.onclick = e => {
  const b = e.target.closest('button[data-action]');
  if (b) {
    b.dataset.action === 'edit' ? edit(b.dataset.id) : del(b.dataset.id);
    return;
  }
  const row = e.target.closest('tr[data-id]');
  if (row?.dataset.id) edit(row.dataset.id);
};

form.onsubmit = async e => {
  e.preventDefault();
  if(!form.reportValidity()) return;
  const saveBtn=document.getElementById('saveBtn'); const buttonLabel=saveBtn.querySelector('.button-label'); const originalLabel=buttonLabel.textContent; saveBtn.classList.add('loading'); saveBtn.disabled=true; buttonLabel.textContent = form.record_id.value ? '更新中…' : '登録中…';
  const p = Object.fromEntries(new FormData(form).entries());
  p.action = p.record_id ? 'update' : 'create';
  try {
    const d = await callGas(p);
    if (!d.ok) throw new Error(d.message);
    show('ok', p.action === 'create' ? '登録しました。' : '更新しました。');
    resetForm();
    setView('list');
    await load();
  } catch(err) {
    show('error', '保存に失敗しました。\n' + err.message);
  } finally { saveBtn.classList.remove('loading'); saveBtn.disabled=false; buttonLabel.textContent=originalLabel; }
};

// ── refined interactions ─────────────────────────────
let formDirty=false;
form.addEventListener('input',()=>{ formDirty=true; });
form.addEventListener('change',()=>{ formDirty=true; });
window.addEventListener('beforeunload',e=>{ if(formDirty && !document.getElementById('formView').classList.contains('hidden')){ e.preventDefault(); e.returnValue=''; } });
const originalSetView=setView; setView=function(v){ if(v==='list') formDirty=false; originalSetView(v); };

// ── init ──────────────────────────────────────────────
resetForm();
load();
</script>
</body>
</html>
