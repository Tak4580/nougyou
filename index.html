<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#ffffff"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><title>日本農業新聞 購読管理</title><link rel="stylesheet" href="style.css"></head><body>
<div class="app"><header class="app-header"><div class="header-inner"><div class="logo"><div class="logo-mark" aria-hidden="true">N</div><div><div class="logo-title">日本農業新聞 購読管理</div><div class="logo-sub">SUBSCRIPTION MANAGEMENT</div></div></div><nav class="nav" aria-label="主要メニュー"><a class="tab active" href="index.html"><span class="tab-icon">▤</span><span>契約一覧</span></a><a class="tab tab-primary" href="edit.html"><span class="tab-icon">＋</span><span>新規登録</span></a></nav><button id="healthBtn" class="connection-status" aria-label="接続状態を確認"><span class="status-dot"></span><span class="connection-label">接続確認</span></button></div></header>
<main class="main"><div class="topbar"><div class="search-wrap"><span class="search-icon" aria-hidden="true">⌕</span><input id="keyword" autocomplete="off" placeholder="氏名・住所・電話・販売店・組合員番号で検索"><button type="button" id="clearSearchBtn" class="search-clear hidden" aria-label="検索をクリア">×</button></div></div><div id="result"></div><div class="view-area">
<section id="listView">
<div class="list-card">
  <div class="list-toolbar-row">
    <h2>契約一覧</h2>
    <span class="list-count" id="resultCount">0件</span>
  </div>
  <div class="toolbar">
    <div class="filters">
      <select id="statusFilter"><option value="">状態：すべて</option><option>購読中</option><option>解約予定</option><option>解約済</option></select>
      <select id="mediaFilter"><option value="">媒体：すべて</option><option>紙版</option><option>電子版</option><option>併読</option></select>
    </div>
    <button id="clearFiltersBtn" class="btn-text">条件を解除</button><button id="reloadBtn" class="icon-action" aria-label="一覧を再読み込み" title="再読み込み">↻</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>氏名</th><th>電話番号</th><th>住所</th><th>媒体</th><th>状態</th><th>開始日</th><th>終了日</th><th>販売店</th><th>支払方法</th><th>操作</th></tr></thead>
      <tbody id="listBody"></tbody>
    </table>
    <div id="empty" class="empty hidden"><div class="empty-icon">▤</div><strong>契約データがありません</strong><span>「新規登録」から最初の契約を登録できます。</span><a class="btn-primary" href="edit.html" style="text-decoration:none">＋ 新規契約を登録</a></div>
  </div>
</div>
</section>
</div></main></div>
<script src="common.js"></script>
<script src="list.js"></script>
</body>
</html>
